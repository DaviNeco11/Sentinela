[pytest]

# Diretório onde o pytest deve procurar testes
testpaths = tests

# Padrões de descoberta de arquivos de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ativa suporte automático a testes assíncronos (pytest-asyncio)
asyncio_mode = auto

# Mostra saída mais limpa no terminal
addopts = -ra -q

# Evita warnings de marcação desconhecida
markers =
    asyncio: marca testes assíncronos

# Ajusta o caminho do projeto para evitar erros de import
pythonpath = .